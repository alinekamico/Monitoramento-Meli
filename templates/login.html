<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Central de Promoções ML</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: #f5a623;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
    .logo-text p  { font-size: 12px; color: #64748b; }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #f5a623; }
    .erro {
      background: #3b1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 18px;
    }
    button {
      width: 100%;
      margin-top: 24px;
      background: #f5a623;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛒</div>
      <div class="logo-text">
        <h1>Central de Promoções ML</h1>
        <p>Acesso restrito</p>
      </div>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      {% if erro %}
      <div class="erro">{{ erro }}</div>
      {% endif %}
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="••••••••" required>
      <button type="submit">Entrar</button>
    </form>
    <div style="text-align:center;margin-top:16px">
      <a href="/esqueci-senha" style="color:#64748b;font-size:12px;text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='#facc15'" onmouseout="this.style.color='#64748b'">
        Esqueci minha senha
      </a>
    </div>
  </div>
</body>
</html>
