<!DOCTYPE html>
<html lang=pt-BR>
<head>
  <meta charset=UTF-8/>
  <meta name=viewport content=width=device-width,initial-scale=1/>
  <title>Trocar Senha — Central de Promoções ML</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e2e8f0; --muted: #64748b; --accent: #facc15;
      --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      font-size: 13px; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-icon {
      width: 40px; height: 40px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .logo-text h1 { font-size: 16px; font-weight: 700; color: var(--text); }
    .logo-text p { font-size: 12px; color: var(--muted); }
    .aviso {
      background: #1e2a1e; border: 1px solid #2d4a2d;
      color: #86efac; border-radius: 8px; padding: 12px 14px;
      font-size: 12px; margin-bottom: 24px; line-height: 1.5;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 10px 12px;
      font-size: 13px; outline: none; transition: border 0.15s;
      margin-bottom: 16px;
    }
    input[type=password]:focus { border-color: var(--accent); }
    .btn-submit {
      width: 100%; background: var(--accent); color: #0f1117;
      border: none; border-radius: 8px; padding: 11px;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .erro {
      background: #2a1515; border: 1px solid #4a2020;
      color: #fca5a5; border-radius: 8px; padding: 10px 12px;
      font-size: 12px; margin-bottom: 16px;
    }
    .requisitos {
      font-size: 11px; color: var(--muted); margin-bottom: 20px; line-height: 1.6;
    }
    .requisitos ul { padding-left: 16px; }
  </style>
</head>
<body>
  <div class=card>
    <div class=logo>
      <div class=logo-icon>🏪</div>
      <div class=logo-text>
        <h1>Central de Promoções ML</h1>
        <p>Primeiro acesso — definir nova senha</p>
      </div>
    </div>
    <div class=aviso>
      🔒 Por segurança, você precisa definir uma nova senha antes de continuar.
    </div>
    {% if erro %}
    <div class=erro>{{ erro }}</div>
    {% endif %}
    <form method=POST>
      <label>Nova senha</label>
      <input type=password name=nova_senha placeholder=Mínimo 6 caracteres autofocus required/>
      <label>Confirmar nova senha</label>
      <input type=password name=confirma_senha placeholder=Repita a senha required/>
      <div class=requisitos>
        <ul>
          <li>Mínimo de 6 caracteres</li>
          <li>Evite senhas simples como 123456 ou senha</li>
        </ul>
      </div>
      <button type=submit class=btn-submit>Salvar nova senha</button>
    </form>
  </div>
</body>
</html>
